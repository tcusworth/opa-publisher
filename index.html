<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPA Community Publisher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0e14;--surface:#111820;--surface2:#1a2330;--border:#1e2d3d;
    --accent:#00d4ff;--accent2:#00ff88;--warn:#ff6b35;
    --text:#c8d8e8;--text-dim:#5a7a8a;--text-bright:#e8f4ff;
  }
  * { box-sizing:border-box;margin:0;padding:0; }
  body { background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column; }
  body::before { content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0; }
  header { position:relative;z-index:1;padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:rgba(10,14,20,0.9);backdrop-filter:blur(10px); }
  .logo { width:36px;height:36px;border:2px solid var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--accent); }
  header h1 { font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--text-bright);letter-spacing:1px;text-transform:uppercase; }
  header span { font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);margin-left:auto; }
  .dot { width:8px;height:8px;border-radius:50%;background:var(--accent2);box-shadow:0 0 8px var(--accent2);animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .main { position:relative;z-index:1;flex:1;display:grid;grid-template-columns:1fr 1fr;max-width:1400px;margin:0 auto;width:100%;padding:32px;gap:24px; }
  @media(max-width:900px){.main{grid-template-columns:1fr;}}
  .panel { background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column; }
  .ph { padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface2); }
  .ph .step { width:22px;height:22px;border-radius:50%;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent); }
  .ph h2 { font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase; }
  .pb { padding:20px;flex:1;display:flex;flex-direction:column;gap:16px; }
  textarea { width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.6;padding:14px;resize:none;flex:1;min-height:260px;outline:none;transition:border-color 0.2s; }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--text-dim); }
  .btn { display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;letter-spacing:0.5px;cursor:pointer;border:none;transition:all 0.2s;text-transform:uppercase; }
  .btn-p{background:var(--accent);color:#000;width:100%;} .btn-p:hover{background:#00b8d9;} .btn-p:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-g{background:var(--accent2);color:#000;width:100%;} .btn-g:hover{background:#00e07a;} .btn-g:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-s{background:transparent;color:var(--text-dim);border:1px solid var(--border);width:100%;} .btn-s:hover{border-color:var(--accent);color:var(--accent);}
  .fl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;}
  .fv{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--text-bright);line-height:1.6;}
  .fv.title{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);}
  .fv.body{min-height:100px;font-size:12px;line-height:1.7;white-space:pre-wrap;max-height:180px;overflow-y:auto;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;}
  .tag{padding:3px 10px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;border:1px solid rgba(0,212,255,0.3);color:var(--accent);background:rgba(0,212,255,0.05);}
  .sm{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;align-items:flex-start;gap:12px;}
  .si{width:36px;height:36px;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .sn h3{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent2);} .sn p{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.5;}
  select{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 10px;outline:none;cursor:pointer;width:100%;margin-top:8px;}
  .lb{height:2px;background:var(--border);border-radius:2px;overflow:hidden;position:relative;} .lb::after{content:'';position:absolute;left:-40%;width:40%;height:100%;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:slide 1.2s infinite;} @keyframes slide{to{left:140%;}}
  .msg{padding:10px 14px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:11px;}
  .msg.info{background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);color:var(--accent);}
  .msg.ok{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);color:var(--accent2);}
  .msg.err{background:rgba(255,107,53,0.05);border:1px solid rgba(255,107,53,0.2);color:var(--warn);}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0.3;padding:40px;text-align:center;}
  .empty p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);}
  .dq{background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.15);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;font-style:italic;line-height:1.6;}
  .div{height:1px;background:var(--border);}
  .sp{width:14px;height:14px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;} @keyframes spin{to{transform:rotate(360deg);}}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s;}
  .ov.show{opacity:1;pointer-events:all;}
  .oc{background:var(--surface);border:1px solid var(--accent2);border-radius:16px;padding:40px;text-align:center;max-width:420px;width:90%;transform:scale(0.9);transition:transform 0.3s;box-shadow:0 0 60px rgba(0,255,136,0.1);}
  .ov.show .oc{transform:scale(1);}
  .oc .ck{font-size:48px;margin-bottom:16px;} .oc h2{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--accent2);margin-bottom:8px;}
  .oc p{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:24px;} .oc a{color:var(--accent);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .cc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);text-align:right;margin-top:-10px;}
  .fg{display:flex;flex-direction:column;gap:6px;}
</style>
</head>
<body>
<header>
  <div class="logo">OPA</div>
  <h1>Community Publisher</h1>
  <span>opacommunity.com</span>
  <div class="dot"></div>
</header>
<div class="main">
  <div class="panel">
    <div class="ph"><div class="step">1</div><h2>LinkedIn Post Input</h2></div>
    <div class="pb">
      <textarea id="post" placeholder="Paste your LinkedIn post here...&#10;&#10;The tool will:&#10;&#10; Convert it into a community discussion format&#10; Auto-select the best space based on content&#10; Preview before posting"></textarea>
      <div class="cc" id="cc">0 characters</div>
      <button class="btn btn-p" id="cb" onclick="convert()"><span id="ct">Convert Post</span></button>
      <div id="cs"></div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><div class="step">2</div><h2>Preview &amp; Publish</h2></div>
    <div class="pb">
      <div class="empty" id="es">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Converted post will appear here</p>
      </div>
      <div id="out" style="display:none;flex-direction:column;gap:14px;flex:1;">
        <div class="fg"><div class="fl">Title</div><div class="fv title" id="pt"></div></div>
        <div class="fg"><div class="fl">Body</div><div class="fv body" id="pb2"></div></div>
        <div class="fg"><div class="fl">Discussion Question</div><div class="dq" id="pq"></div></div>
        <div class="fg"><div class="fl">Tags</div><div class="tags" id="pg"></div></div>
        <div class="div"></div>
        <div class="fg">
          <div class="fl">Target Space</div>
          <div class="sm">
            <div class="si" id="spi">&#128194;</div>
            <div class="sn" style="flex:1">
              <h3 id="spn">&mdash;</h3>
              <p id="spr">&mdash;</p>
              <select id="spo" onchange="override()">
                <option value="">Override space...</option>
                <option value="6">System Architecture</option>
                <option value="7">Migration &amp; Modernizations</option>
                <option value="10">Starter Kit</option>
                <option value="11">Control Software &amp; Portability</option>
                <option value="25">Cybersecurity</option>
                <option value="45">Economics &amp; ROI</option>
                <option value="48">Executive Guides</option>
                <option value="52">Events &amp; Webinars</option>
              </select>
            </div>
          </div>
        </div>
        <div id="ps"></div>
        <button class="btn btn-g" id="pb3" onclick="publish()"><span id="pbt">Publish to OPA Community</span></button>
        <button class="btn btn-s" onclick="reset()">Start Over</button>
      </div>
    </div>
  </div>
</div>
<div class="ov" id="ov">
  <div class="oc">
    <div class="ck">&#10003;</div>
    <h2>Post Published!</h2>
    <p id="om">Your post is now live on OPA Community.</p>
    <a id="ol" href="#" target="_blank">View post &rarr;</a><br><br>
    <button class="btn btn-s" onclick="closeOv()" style="width:auto;padding:8px 20px;">Close</button>
  </div>
</div>
<script>
  var PROXY = 'https://icelcghcpjukjgablttc.supabase.co/functions/v1/proxy';
  var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZWxjZ2hjcGp1a2pnYWJsdHRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODI0OTcsImV4cCI6MjA5MTI1ODQ5N30.U180rSNWvwRI_qqYVqHQGloOOAW646_HzvEP0pYaMms';
  var SPACES = {
    6:{title:'System Architecture',icon:'\uD83C\uDFD7\uFE0F',slug:'sys-architecture'},
    7:{title:'Migration & Modernizations',icon:'\uD83D\uDD04',slug:'pathways'},
    10:{title:'Starter Kit',icon:'\uD83D\uDCE6',slug:'starter-kit'},
    11:{title:'Control Software & Portability',icon:'\uD83D\uDCBE',slug:'portability'},
    25:{title:'Cybersecurity',icon:'\uD83D\uDD12',slug:'cyber'},
    45:{title:'Economics & ROI',icon:'\uD83D\uDCB0',slug:'economicsroi'},
    48:{title:'Executive Guides',icon:'\uD83C\uDFAF',slug:'executiveguides'},
    52:{title:'Events & Webinars',icon:'\uD83D\uDCC5',slug:'eventswebinars'}
  };
  var conv = null, spaceId = null;

  document.getElementById('post').addEventListener('input', function() {
    document.getElementById('cc').textContent = this.value.length + ' characters';
  });

  function status(id, type, msg) {
    var e = document.getElementById(id);
    if (!msg) { e.innerHTML = ''; return; }
    e.innerHTML = '<div class="msg ' + type + '">' + msg + '</div>';
  }

  async function call(action, payload) {
    var r = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
      body: JSON.stringify({ action: action, payload: payload })
    });
    return r.json();
  }

  async function convert() {
    var post = document.getElementById('post').value.trim();
    if (!post) { status('cs', 'err', 'Paste a LinkedIn post first.'); return; }
    var btn = document.getElementById('cb'); btn.disabled = true;
    document.getElementById('ct').innerHTML = '<div class="sp"></div>&nbsp;Converting...';
    status('cs', 'info', '<div class="lb"></div>');
    try {
      var spaceList = Object.entries(SPACES).map(function(e) { return e[0] + ': ' + e[1].title; }).join('\n');
      var prompt = 'You are converting a LinkedIn post into a community discussion post for opacommunity.com, focused on Open Process Automation (OPA/O-PAS).\n\nLINKEDIN POST:\n' + post + '\n\nAVAILABLE SPACES:\n' + spaceList + '\n\nReturn ONLY valid JSON, no markdown, no backticks:\n{"title":"Short sharp title max 12 words no fluff","body":"Converted body. Keep core insight. Break into short paragraphs. Remove hashtags. Add 1-2 bold statements with **asterisks**. Make conversational not broadcast.","tags":["3-5 from: OPA, Industrial Automation, OT, Architecture, AI, Digital Transformation, Control Systems"],"discussion_question":"Strong question provoking opinion or experience, not yes/no","space_id":0,"space_reason":"One sentence why this space was chosen"}';
      var data = await call('convert', { prompt: prompt });
      if (data.error) throw new Error(data.error);
      var raw = data.content[0].text.trim().replace(/^```json/, '').replace(/^```/, '').replace(/```$/, '').trim();
      conv = JSON.parse(raw);
      document.getElementById('pt').textContent = conv.title;
      document.getElementById('pb2').textContent = conv.body;
      document.getElementById('pq').textContent = conv.discussion_question;
      var tg = document.getElementById('pg'); tg.innerHTML = '';
      (conv.tags || []).forEach(function(t) { var s = document.createElement('span'); s.className = 'tag'; s.textContent = t; tg.appendChild(s); });
      spaceId = conv.space_id;
      var sp = SPACES[spaceId];
      if (sp) { document.getElementById('spi').textContent = sp.icon; document.getElementById('spn').textContent = sp.title; document.getElementById('spr').textContent = conv.space_reason || ''; }
      document.getElementById('es').style.display = 'none';
      document.getElementById('out').style.display = 'flex';
      status('cs', 'ok', 'Converted successfully. Review and publish below.');
    } catch(e) { status('cs', 'err', 'Error: ' + e.message); }
    btn.disabled = false;
    document.getElementById('ct').textContent = 'Convert Post';
  }

  function override() {
    var sel = document.getElementById('spo'); var val = parseInt(sel.value); if (!val) return;
    spaceId = val; var sp = SPACES[val];
    document.getElementById('spi').textContent = sp.icon;
    document.getElementById('spn').textContent = sp.title;
    document.getElementById('spr').textContent = 'Manually selected';
    sel.value = '';
  }

  async function publish() {
    if (!conv || !spaceId) return;
    var btn = document.getElementById('pb3'); btn.disabled = true;
    document.getElementById('pbt').innerHTML = '<div class="sp"></div>&nbsp;Publishing...';
    status('ps', 'info', '<div class="lb"></div>');
    try {
      var fullBody = conv.body + '\n\n---\n\n**Discussion:** ' + conv.discussion_question;
      var result = await call('post', {
        postData: { title: conv.title, message: fullBody, space_id: spaceId, status: 'published', privacy: 'public' }
      });
      if (result.success && result.feed) {
        var sp = SPACES[spaceId];
        document.getElementById('om').textContent = 'Published to "' + sp.title + '" space.';
        document.getElementById('ol').href = result.feed.permalink;
        document.getElementById('ov').classList.add('show');
      } else {
        throw new Error(result.message || JSON.stringify(result).substring(0, 120));
      }
    } catch(e) { status('ps', 'err', 'Error: ' + e.message); }
    btn.disabled = false;
    document.getElementById('pbt').textContent = 'Publish to OPA Community';
  }

  function reset() {
    conv = null; spaceId = null;
    document.getElementById('post').value = '';
    document.getElementById('cc').textContent = '0 characters';
    document.getElementById('es').style.display = 'flex';
    document.getElementById('out').style.display = 'none';
    status('cs', '', ''); status('ps', '', '');
  }

  function closeOv() { document.getElementById('ov').classList.remove('show'); reset(); }
</script>
</body>
</html>
